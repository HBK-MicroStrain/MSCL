name: Main Workflow

on:
  push:
  pull_request:
    branches: [ main, develop ]

jobs:
  static-cpp-msvc-2022-x64:
    name: 'Static C++ (MSVC 2022 x64)'
    uses: HBK-MicroStrain-Internal/workflows/.github/workflows/msvc-2022-x64.yml@main
    with:
      job_name: 'Static C++'
      debug: true
      release: true
      configure_preset: 'tests'
      build_preset: 'static'
      unit_test: true
      unit_test_preset: 'tests'
      package_preset: 'static'
      artifact_match_pattern: '*MSCL-Cpp*.zip'

  static-cpp-msvc-2022-x86:
    name: 'Static C++ (MSVC 2022 x86)'
    uses: HBK-MicroStrain-Internal/workflows/.github/workflows/msvc-2022-x86.yml@main
    with:
      job_name: 'Static C++'
      debug: true
      release: true
      configure_preset: 'tests'
      build_preset: 'static'
      unit_test: true
      unit_test_preset: 'tests'
      package_preset: 'static'
      artifact_match_pattern: '*MSCL-Cpp*.zip'

  csharp-msvc-2022-x64:
    name: 'C# (MSVC 2022 x64)'
    uses: HBK-MicroStrain-Internal/workflows/.github/workflows/msvc-2022-x64-bindings.yml@main
    with:
      job_name: 'C#'
      debug: true
      release: true
      preset: 'csharp'
      build_preset: 'static'
      artifact_match_pattern: '*MSCL-CSharp*.zip'

  csharp-msvc-2022-x86:
    name: 'C# (MSVC 2022 x86)'
    uses: HBK-MicroStrain-Internal/workflows/.github/workflows/msvc-2022-x86-bindings.yml@main
    with:
      job_name: 'C#'
      debug: true
      release: true
      preset: 'csharp'
      build_preset: 'static'
      artifact_match_pattern: '*MSCL-CSharp*.zip'
